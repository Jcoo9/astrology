<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ora — Your Chart. Your Clarity.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
:root{--cream:#FAF8F4;--ink:#1A1714;--ink60:rgba(26,23,20,0.6);--ink30:rgba(26,23,20,0.3);--ink10:rgba(26,23,20,0.1);--gold:#B8975A;--goldl:#F2EAD9;--surf:#F4F1EB;--white:#fff;--rsm:8px;--rmd:14px;--rlg:20px;--rpill:100px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1.5px 1.5px at 15% 20%,rgba(184,151,90,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 72% 15%,rgba(184,151,90,0.3) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 10% 70%,rgba(184,151,90,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 85% 60%,rgba(184,151,90,0.3) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 90%,rgba(184,151,90,0.3) 0%,transparent 100%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
.card{width:100%;max-width:520px;background:var(--white);border-radius:var(--rlg);border:1px solid var(--ink10);overflow:hidden;box-shadow:0 2px 40px rgba(26,23,20,0.08);display:flex;flex-direction:column;min-height:580px;}
.hdr{text-align:center;padding:2rem 1.5rem 1.25rem;border-bottom:1px solid var(--ink10);position:relative;}
.hdr::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:40px;height:2px;background:var(--gold);}
.wordmark{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;letter-spacing:0.4em;text-indent:0.4em;color:var(--ink);}
.tagline{font-size:11px;letter-spacing:0.18em;color:var(--gold);margin-top:5px;text-transform:uppercase;}
.screen{display:none;flex-direction:column;flex:1;}
.screen.active{display:flex;}
.obody{flex:1;display:flex;flex-direction:column;align-items:center;padding:2rem 1.75rem;gap:1.5rem;}
.intro{text-align:center;}
.intro h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;font-style:italic;line-height:1.3;margin-bottom:0.6rem;}
.intro p{font-size:13.5px;color:var(--ink60);line-height:1.75;max-width:340px;margin:0 auto;}
.divider{width:32px;height:1px;background:var(--gold);opacity:0.6;}
.form{width:100%;display:flex;flex-direction:column;gap:1rem;}
.field{display:flex;flex-direction:column;gap:6px;}
.flabel{font-size:10.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink60);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
input{width:100%;padding:11px 14px;border-radius:var(--rsm);border:1px solid var(--ink10);background:var(--surf);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;}
input:focus{outline:none;border-color:var(--gold);background:var(--white);}
input::placeholder{color:var(--ink30);}
.btn{width:100%;padding:13px;border-radius:var(--rsm);border:none;background:var(--ink);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;letter-spacing:0.08em;cursor:pointer;margin-top:0.25rem;}
.btn:hover{background:#2E2A26;}
.errmsg{font-size:12px;color:#C0392B;text-align:center;padding:0.4rem 0;}
.notice{font-size:11px;color:var(--ink30);text-align:center;}
.strip{display:flex;align-items:center;justify-content:center;padding:0.85rem 1rem;border-bottom:1px solid var(--ink10);background:var(--surf);flex-wrap:wrap;}
.planet{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 0.85rem;border-right:1px solid var(--ink10);}
.planet:last-child{border-right:none;}
.plabel{font-size:9.5px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);}
.pval{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--ink);white-space:nowrap;}
.msgs{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.1rem;min-height:280px;max-height:360px;}
.msg{display:flex;flex-direction:column;gap:4px;max-width:90%;animation:fu 0.25s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.ora{align-self:flex-start;}
.msg.usr{align-self:flex-end;}
.msender{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink30);padding:0 4px;}
.msg.usr .msender{text-align:right;}
.bubble{padding:13px 17px;border-radius:var(--rmd);line-height:1.7;border:1px solid transparent;}
.msg.ora .bubble{background:var(--goldl);border-color:rgba(184,151,90,0.2);font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--ink);border-radius:var(--rmd) var(--rmd) var(--rmd) 4px;}
.msg.usr .bubble{background:var(--ink);color:var(--cream);font-size:14px;border-radius:var(--rmd) var(--rmd) 4px var(--rmd);}
.tbubble{display:flex;gap:5px;align-items:center;padding:16px 20px;background:var(--goldl);border:1px solid rgba(184,151,90,0.2);border-radius:var(--rmd) var(--rmd) var(--rmd) 4px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:br 1.3s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes br{0%,100%{opacity:0.3;transform:scale(0.75);}50%{opacity:1;transform:scale(1);}}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 1.5rem 0.75rem;}
.chip{padding:6px 14px;border-radius:var(--rpill);border:1px solid var(--ink10);background:var(--surf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--ink60);cursor:pointer;white-space:nowrap;}
.chip:hover{border-color:var(--gold);color:var(--ink);background:var(--goldl);}
.iarea{display:flex;gap:10px;padding:0.85rem 1.25rem 1.25rem;border-top:1px solid var(--ink10);align-items:flex-end;background:var(--white);}
textarea{flex:1;resize:none;padding:11px 14px;border-radius:var(--rmd);border:1px solid var(--ink10);background:var(--surf);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:44px;max-height:120px;}
textarea:focus{outline:none;border-color:var(--gold);background:var(--white);}
textarea::placeholder{color:var(--ink30);}
.sbtn{width:44px;height:44px;border-radius:50%;border:none;background:var(--ink);color:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sbtn:hover{opacity:0.85;}
.sbtn:disabled{opacity:0.3;cursor:not-allowed;}
@media(max-width:560px){.app{padding:0;justify-content:flex-start;}.card{border-radius:0;min-height:100svh;}}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="hdr">
      <div class="wordmark">ORA</div>
      <div class="tagline">Your chart. Your clarity.</div>
    </div>
    <div class="screen active" id="s-onboard">
      <div class="obody">
        <div class="intro">
          <h2>Know yourself more clearly.</h2>
          <p>Ora is a real conversation about your actual life — grounded in your birth chart. Not a horoscope. Not a personality quiz.</p>
        </div>
        <div class="divider"></div>
        <div class="form">
          <div class="field"><div class="flabel">Your name</div><input type="text" id="iname" placeholder="First name" /></div>
          <div class="field"><div class="flabel">Date of birth</div><input type="date" id="idate" /></div>
          <div class="frow">
            <div class="field"><div class="flabel">Birth time <span style="opacity:0.5;font-size:9px;">optional</span></div><input type="time" id="itime" /></div>
            <div class="field"><div class="flabel">Birth city</div><input type="text" id="icity" placeholder="City, Country" /></div>
          </div>
          <div id="errmsg" class="errmsg" style="display:none;"></div>
          <button class="btn" onclick="begin()">Begin your reading</button>
          <p class="notice">Free to use. Your birth data is never stored.</p>
        </div>
      </div>
    </div>
    <div class="screen" id="s-chat">
      <div class="strip" id="strip"></div>
      <div class="msgs" id="msgs"></div>
      <div class="chips" id="chips"></div>
      <div class="iarea">
        <textarea id="userinput" placeholder="Ask Ora anything about your chart…" rows="1" onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
        <button class="sbtn" id="sbtn" onclick="send()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 2.5L2 7.5L7 8.5L8.5 13.5L13.5 2.5Z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
<script>
const KEY="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";
const SIGNS=['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
const SYMS=['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];
const SDATES=[[3,21],[4,20],[5,21],[6,22],[7,23],[8,23],[9,23],[10,24],[11,22],[12,22],[1,20],[2,19]];
let udata={},C={},hist=[],busy=false;
function sunIdx(m,d){for(let i=0;i<12;i++){const[sm,sd]=SDATES[i];if(m===sm&&d>=sd)return i;}for(let i=11;i>=0;i--){const[sm,sd]=SDATES[i];if(m===sm&&d<sd)return(i+11)%12;}return 0;}
function moonIdx(ds){const days=(new Date(ds+'T12:00:00Z')-new Date('2000-01-01T00:00:00Z'))/86400000;return((Math.floor(days/2.53)%12)+12)%12;}
function buildChart(name,ds,ts,city){const d=new Date(ds+'T12:00:00'),m=d.getMonth()+1,day=d.getDate(),yr=d.getFullYear();const hour=ts?parseInt(ts.split(':')[0]):null;const si=sunIdx(m,day),mi=moonIdx(ds);const mci=((si+(m%3===0?1:m%3===1?-1:0))+12)%12;const vi=(si+2)%12,mari=(si+6)%12;const ri=hour!==null?(si+Math.round(hour/2)+1)%12:null;return{name,city,yr,sun:{s:SIGNS[si],y:SYMS[si]},moon:{s:SIGNS[mi],y:SYMS[mi]},rising:ri!==null?{s:SIGNS[ri],y:SYMS[ri]}:null,mercury:{s:SIGNS[mci],y:SYMS[mci]},venus:{s:SIGNS[vi],y:SYMS[vi]},mars:{s:SIGNS[mari],y:SYMS[mari]}};}
function renderStrip(c){const pl=[{l:'Sun',p:c.sun},{l:'Moon',p:c.moon},...(c.rising?[{l:'Rising',p:c.rising}]:[]),{l:'Mercury',p:c.mercury},{l:'Venus',p:c.venus},{l:'Mars',p:c.mars}];document.getElementById('strip').innerHTML=pl.map(({l,p})=>`<div class="planet"><div class="plabel">${l}</div><div class="pval">${p.y} ${p.s}</div></div>`).join('');}
function sysprompt(c){return `You are Ora — a calm, wise astrology companion. Speak like a brilliant friend who knows astrology deeply. Warm, clear, never vague or mystical for its own sake.\n\nUser: ${c.name}, born in ${c.city}, ${c.yr}.\nBirth chart — Sun: ${c.sun.s}, Moon: ${c.moon.s}${c.rising?', Rising: '+c.rising.s:''}, Mercury: ${c.mercury.s}, Venus: ${c.venus.s}, Mars: ${c.mars.s}.\n\nApproach: Real conversations about their actual life. Reference placements naturally. Ask good questions. Make them feel smarter. Keep responses 2-4 sentences. No spiritual filler. Connect astrology to something real every time.`;}
const SDESC={Aries:'a drive to initiate and lead',Taurus:'a deep need for beauty and stability',Gemini:'a restless curious intelligence',Cancer:'a powerful emotional intuition',Leo:'a generous and expressive core',Virgo:'a discerning precise mind',Libra:'an instinct for harmony and fairness',Scorpio:"an intensity that wants to understand what's real",Sagittarius:'a hunger for meaning and freedom',Capricorn:'a quiet formidable ambition',Aquarius:'an independent visionary streak',Pisces:'a deep empathy and rich inner life'};
const MDESC={Aries:'emotions that want immediate resolution',Taurus:'feelings that need time and comfort to settle',Gemini:'an inner world you process by talking',Cancer:'a vast and deeply felt emotional core',Leo:'emotions that need to be witnessed',Virgo:'a tendency to analyze feelings before fully feeling them',Libra:'an emotional life shaped by your relationships',Scorpio:'feelings that run much deeper than most people realize',Sagittarius:'a heart that needs freedom to stay open',Capricorn:'emotions held close until trust is earned',Aquarius:'a sensitive core protected by detachment',Pisces:'an emotional permeability that picks up on everything'};
function opening(c){return `Hello, ${c.name}. With your ${c.sun.s} Sun and ${c.moon.s} Moon, you carry ${SDESC[c.sun.s]||'a distinct inner force'} alongside ${MDESC[c.moon.s]||"an emotional nature that's entirely your own"}. That's an interesting combination — one I'd love to explore with you. What's actually on your mind right now?`;}
const CPOOLS=[['Tell me about my Moon sign','What does my Venus say about love?','How do others see me?'],["What drives me, really?",'What is my blind spot?','Am I in a good time for decisions?'],['How do I handle conflict?','What patterns do I repeat?','What does Mars say about my ambition?'],['How do I process emotions?','What makes me feel most alive?','What is my relationship to risk?']];
let ci=0;
function showChips(){const p=CPOOLS[ci%CPOOLS.length];ci++;document.getElementById('chips').innerHTML=p.map(s=>`<div class="chip" onclick="useChip(this)">${s}</div>`).join('');}
function useChip(el){document.getElementById('userinput').value=el.textContent;document.getElementById('chips').innerHTML='';send();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function addMsg(role,text){const w=document.getElementById('msgs'),el=document.createElement('div');el.className='msg '+(role==='assistant'?'ora':'usr');el.innerHTML=`<div class="msender">${role==='assistant'?'Ora':udata.name||'You'}</div><div class="bubble">${esc(text)}</div>`;w.appendChild(el);w.scrollTop=w.scrollHeight;}
function showTyping(){const w=document.getElementById('msgs'),el=document.createElement('div');el.className='msg ora';el.id='tel';el.innerHTML='<div class="msender">Ora</div><div class="tbubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';w.appendChild(el);w.scrollTop=w.scrollHeight;}
function removeTyping(){const el=document.getElementById('tel');if(el)el.remove();}
async function callOra(txt){hist.push({role:'user',content:txt});addMsg('user',txt);showTyping();busy=true;document.getElementById('sbtn').disabled=true;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sysprompt(C),messages:hist})});const data=await res.json();if(!res.ok)throw new Error(data.error?.message||'API error '+res.status);const reply=data.content?.[0]?.text||'Something went quiet — try again.';removeTyping();hist.push({role:'assistant',content:reply});addMsg('assistant',reply);showChips();}catch(e){removeTyping();console.error('Ora error:',e);addMsg('assistant','Connection issue — please try again in a moment.');}busy=false;document.getElementById('sbtn').disabled=false;}
function begin(){const name=document.getElementById('iname').value.trim();const date=document.getElementById('idate').value;const time=document.getElementById('itime').value;const city=document.getElementById('icity').value.trim();const err=document.getElementById('errmsg');if(!name||!date||!city){err.textContent='Please enter your name, date of birth, and birth city.';err.style.display='block';return;}err.style.display='none';udata={name,date,time,city};C=buildChart(name,date,time,city);hist=[];document.getElementById('s-onboard').classList.remove('active');document.getElementById('s-chat').classList.add('active');renderStrip(C);const op=opening(C);hist.push({role:'assistant',content:op});addMsg('assistant',op);showChips();}
async function send(){if(busy)return;const inp=document.getElementById('userinput'),text=inp.value.trim();if(!text)return;inp.value='';inp.style.height='auto';document.getElementById('chips').innerHTML='';await callOra(text);}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
</script>
</body>
</html>
