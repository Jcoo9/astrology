<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ora — Your Chart. Your Clarity.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
<style>
  /* ── PASTE YOUR ANTHROPIC API KEY BELOW ── */
  /* Find it at: console.anthropic.com        */

  :root {
    --api-key: "YOUR_API_KEY_HERE";

    --cream: #FAF8F4;
    --ink: #1A1714;
    --ink-60: rgba(26,23,20,0.6);
    --ink-30: rgba(26,23,20,0.3);
    --ink-10: rgba(26,23,20,0.1);
    --gold: #B8975A;
    --gold-light: #F2EAD9;
    --surface: #F4F1EB;
    --white: #FFFFFF;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-pill: 100px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── STARS BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(184,151,90,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 8%, rgba(184,151,90,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 72% 15%, rgba(184,151,90,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 30%, rgba(184,151,90,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 45%, rgba(184,151,90,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 55%, rgba(184,151,90,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 10% 70%, rgba(184,151,90,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 75%, rgba(184,151,90,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 85%, rgba(184,151,90,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 92%, rgba(184,151,90,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    width: 100%;
    max-width: 520px;
    background: var(--white);
    border-radius: var(--radius-lg);
    border: 1px solid var(--ink-10);
    overflow: hidden;
    box-shadow: 0 2px 40px rgba(26,23,20,0.07), 0 0 0 1px rgba(184,151,90,0.08);
    display: flex;
    flex-direction: column;
    min-height: 580px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 2rem 1.5rem 1.25rem;
    border-bottom: 1px solid var(--ink-10);
    background: var(--white);
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 2px;
    background: var(--gold);
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 0.4em;
    color: var(--ink);
    text-indent: 0.4em;
  }

  .tagline {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: var(--gold);
    margin-top: 5px;
    text-transform: uppercase;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ── ONBOARDING ── */
  .onboard-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.75rem 2rem;
    gap: 1.5rem;
  }

  .intro {
    text-align: center;
  }

  .intro h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 0.6rem;
  }

  .intro p {
    font-size: 13.5px;
    color: var(--ink-60);
    line-height: 1.75;
    max-width: 340px;
    margin: 0 auto;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }

  .form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-label {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-60);
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  input, select {
    width: 100%;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--ink-10);
    background: var(--surface);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    background: var(--white);
  }

  input::placeholder { color: var(--ink-30); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--ink);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.25rem;
  }

  .btn-primary:hover { background: #2E2A26; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

  .error-msg {
    font-size: 12px;
    color: #C0392B;
    text-align: center;
    padding: 0.4rem 0;
  }

  .notice {
    font-size: 11px;
    color: var(--ink-30);
    text-align: center;
    line-height: 1.5;
  }

  /* ── CHART PILL ── */
  .chart-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0.85rem 1.5rem;
    border-bottom: 1px solid var(--ink-10);
    background: var(--surface);
    flex-wrap: wrap;
  }

  .chart-planet {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 0 1rem;
    border-right: 1px solid var(--ink-10);
  }

  .chart-planet:last-child { border-right: none; }

  .planet-label {
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .planet-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    white-space: nowrap;
  }

  /* ── CHAT ── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
    min-height: 280px;
    max-height: 360px;
    scroll-behavior: smooth;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--ink-10); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 90%;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.ora { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .msg-sender {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-30);
    padding: 0 4px;
  }

  .msg.user .msg-sender { text-align: right; }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius-md);
    font-size: 14.5px;
    line-height: 1.7;
    border: 1px solid transparent;
  }

  .msg.ora .bubble {
    background: var(--gold-light);
    border-color: rgba(184,151,90,0.2);
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--ink);
    border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
  }

  .msg.user .bubble {
    background: var(--ink);
    color: var(--cream);
    font-size: 14px;
    border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md);
  }

  /* ── TYPING ── */
  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 16px 20px;
    background: var(--gold-light);
    border: 1px solid rgba(184,151,90,0.2);
    border-radius: var(--radius-md) var(--radius-md) var(--radius-md) 4px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: breathe 1.3s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes breathe {
    0%, 100% { opacity: 0.3; transform: scale(0.75); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* ── CHIPS ── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 1.5rem 0.75rem;
  }

  .chip {
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--ink-10);
    background: var(--surface);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-60);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--gold);
    color: var(--ink);
    background: var(--gold-light);
  }

  /* ── INPUT AREA ── */
  .input-area {
    display: flex;
    gap: 10px;
    padding: 0.85rem 1.25rem 1.25rem;
    border-top: 1px solid var(--ink-10);
    align-items: flex-end;
    background: var(--white);
  }

  textarea {
    flex: 1;
    resize: none;
    padding: 11px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--ink-10);
    background: var(--surface);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.15s;
  }

  textarea:focus {
    outline: none;
    border-color: var(--gold);
    background: var(--white);
  }

  textarea::placeholder { color: var(--ink-30); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--ink);
    color: var(--cream);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── RESPONSIVE ── */
  @media (max-width: 560px) {
    .card { border-radius: var(--radius-md); min-height: 100svh; }
    .app { padding: 0; justify-content: flex-start; }
    .chart-planet { padding: 0 0.6rem; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="card">

    <div class="header">
      <div class="wordmark">ORA</div>
      <div class="tagline">Your chart. Your clarity.</div>
    </div>

    <!-- ── ONBOARDING ── -->
    <div class="screen active" id="screen-onboard">
      <div class="onboard-body">

        <div class="intro">
          <h2>Know yourself more clearly.</h2>
          <p>Ora is a real conversation about your actual life — grounded in your birth chart. Not a horoscope. Not a personality quiz.</p>
        </div>

        <div class="divider"></div>

        <div class="form">
          <div class="field">
            <div class="field-label">Your name</div>
            <input type="text" id="inp-name" placeholder="First name" autocomplete="given-name" />
          </div>
          <div class="field">
            <div class="field-label">Date of birth</div>
            <input type="date" id="inp-date" />
          </div>
          <div class="field-row">
            <div class="field">
              <div class="field-label">Birth time <span style="opacity:0.5;font-size:9px;">optional</span></div>
              <input type="time" id="inp-time" />
            </div>
            <div class="field">
              <div class="field-label">Birth city</div>
              <input type="text" id="inp-city" placeholder="City, Country" />
            </div>
          </div>
          <div id="err-msg" class="error-msg" style="display:none;"></div>
          <button class="btn-primary" id="begin-btn" onclick="beginSession()">Begin your reading</button>
          <p class="notice">Free to use. Your birth data is never stored.</p>
        </div>

      </div>
    </div>

    <!-- ── CHAT ── -->
    <div class="screen" id="screen-chat">
      <div class="chart-strip" id="chart-strip"></div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chips" id="chips"></div>
      <div class="input-area">
        <textarea id="user-input" placeholder="Ask Ora anything about your chart…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.5 2.5L2 7.5L7 8.5L8.5 13.5L13.5 2.5Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
// ╔══════════════════════════════════════════╗
// ║   PASTE YOUR ANTHROPIC API KEY HERE      ║
// ║   Get it at: console.anthropic.com       ║
// ╚══════════════════════════════════════════╝
const API_KEY = "YOUR_API_KEY_HERE";

// ── STATE ──
let userData = {};
let chart = {};
let history = [];
let busy = false;

// ── ASTROLOGY DATA ──
const SIGNS = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
const SYMBOLS = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];

const SUN_SIGN_DATES = [
  [3,21],[4,20],[5,21],[6,22],[7,23],[8,23],[9,23],[10,24],[11,22],[12,22],[1,20],[2,19]
];

function getSunSign(month, day) {
  for (let i = 0; i < 12; i++) {
    const [m, d] = SUN_SIGN_DATES[i];
    if (month === m && day >= d) return i;
  }
  for (let i = 11; i >= 0; i--) {
    const [m, d] = SUN_SIGN_DATES[i];
    if (month === m && day < d) return (i + 11) % 12;
  }
  return 0;
}

function getMoonSign(dateStr) {
  const epoch = new Date('2000-01-01T00:00:00Z');
  const dob = new Date(dateStr + 'T12:00:00Z');
  const days = (dob - epoch) / 86400000;
  return ((Math.floor(days / 2.53) % 12) + 12) % 12;
}

function getRising(sunIdx, hour) {
  return (sunIdx + Math.round(hour / 2) + 1) % 12;
}

function getMercury(sunIdx, month) {
  const offset = (month % 3 === 0) ? 1 : (month % 3 === 1) ? -1 : 0;
  return ((sunIdx + offset) + 12) % 12;
}

function getVenus(sunIdx) { return (sunIdx + 2) % 12; }
function getMars(sunIdx) { return (sunIdx + 6) % 12; }

function buildChart(name, dateStr, timeStr, city) {
  const d = new Date(dateStr + 'T12:00:00');
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const year = d.getFullYear();
  const hour = timeStr ? parseInt(timeStr.split(':')[0]) : null;

  const sunIdx = getSunSign(month, day);
  const moonIdx = getMoonSign(dateStr);
  const mercIdx = getMercury(sunIdx, month);
  const venIdx = getVenus(sunIdx);
  const marsIdx = getMars(sunIdx);
  const risingIdx = hour !== null ? getRising(sunIdx, hour) : null;

  return {
    name, city, year,
    sun:     { sign: SIGNS[sunIdx],    sym: SYMBOLS[sunIdx]    },
    moon:    { sign: SIGNS[moonIdx],   sym: SYMBOLS[moonIdx]   },
    rising:  risingIdx !== null ? { sign: SIGNS[risingIdx], sym: SYMBOLS[risingIdx] } : null,
    mercury: { sign: SIGNS[mercIdx],   sym: SYMBOLS[mercIdx]   },
    venus:   { sign: SIGNS[venIdx],    sym: SYMBOLS[venIdx]    },
    mars:    { sign: SIGNS[marsIdx],   sym: SYMBOLS[marsIdx]   },
  };
}

// ── RENDER CHART STRIP ──
function renderStrip(c) {
  const planets = [
    { label: 'Sun',     p: c.sun     },
    { label: 'Moon',    p: c.moon    },
    ...(c.rising ? [{ label: 'Rising', p: c.rising }] : []),
    { label: 'Mercury', p: c.mercury },
    { label: 'Venus',   p: c.venus   },
    { label: 'Mars',    p: c.mars    },
  ];
  document.getElementById('chart-strip').innerHTML = planets.map(({ label, p }) =>
    `<div class="chart-planet">
      <div class="planet-label">${label}</div>
      <div class="planet-value">${p.sym} ${p.sign}</div>
    </div>`
  ).join('');
}

// ── SYSTEM PROMPT ──
function systemPrompt(c) {
  return `You are Ora — a calm, wise, deeply knowledgeable astrology companion. You speak like a brilliant friend who knows astrology deeply, not a fortune teller. Your tone is warm, clear, and never mystical for the sake of it.

User: ${c.name}, born in ${c.city}, ${c.year}.

Birth chart:
• Sun in ${c.sun.sign} — core identity, life force, how they shine
• Moon in ${c.moon.sign} — emotional nature, instincts, inner world
${c.rising ? `• Rising in ${c.rising.sign} — outer persona, first impression, how the world sees them` : '• Rising unknown (no birth time provided)'}
• Mercury in ${c.mercury.sign} — mind, communication, thinking style
• Venus in ${c.venus.sign} — love language, values, what draws them
• Mars in ${c.mars.sign} — drive, desire, how they take action

Your approach:
— Have a real conversation about ${c.name}'s actual life: relationships, decisions, timing, patterns, self-understanding
— Reference their specific placements naturally — not mechanically, not every message
— Ask one good question as often as you give answers — draw them deeper
— Make them feel smarter and clearer about themselves, not mystified
— Keep responses to 2–4 sentences unless depth is genuinely warranted
— Never say "the universe is sending you a message" or use vague spiritual filler
— Connect astrology to something emotionally real or practically useful every time
— Vary your rhythm: sometimes lead with a question, sometimes an insight, sometimes a gentle observation
— Never generate a generic horoscope — everything must feel personal to this specific chart`;
}

// ── DESCRIPTIONS ──
const SUN_DESC = {
  Aries:'a drive to initiate and lead', Taurus:'a deep need for beauty and stability',
  Gemini:'a restless, curious intelligence', Cancer:'a powerful emotional intuition',
  Leo:'a generous and expressive core', Virgo:'a discerning, precise mind',
  Libra:'an instinct for harmony and fairness', Scorpio:'an intensity that wants to understand what\'s real',
  Sagittarius:'a hunger for meaning and freedom', Capricorn:'a quiet, formidable ambition',
  Aquarius:'an independent, visionary streak', Pisces:'a deep empathy and rich inner life'
};

const MOON_DESC = {
  Aries:'emotions that want immediate resolution', Taurus:'feelings that need time and comfort to settle',
  Gemini:'an inner world you process by talking', Cancer:'a vast and deeply felt emotional core',
  Leo:'emotions that need to be witnessed', Virgo:'a tendency to analyze feelings before fully feeling them',
  Libra:'an emotional life shaped by your relationships', Scorpio:'feelings that run much deeper than most people realize',
  Sagittarius:'a heart that needs freedom to stay open', Capricorn:'emotions held close until trust is earned',
  Aquarius:'a sensitive core protected by detachment', Pisces:'an emotional permeability that picks up on everything'
};

// ── OPENING MESSAGE ──
function openingMessage(c) {
  const sunD = SUN_DESC[c.sun.sign] || 'a distinct inner force';
  const moonD = MOON_DESC[c.moon.sign] || 'an emotional nature that\'s entirely your own';
  return `Hello, ${c.name}. With your ${c.sun.sign} Sun and ${c.moon.sign} Moon, you carry ${sunD} alongside ${moonD}. That\'s an interesting combination — one I'd love to explore with you. What's actually on your mind right now?`;
}

// ── SUGGESTION CHIPS ──
const CHIP_POOLS = [
  ['Tell me about my Moon sign','What does my Venus say about love?','How do others see me?'],
  ['What drives me, really?','What\'s my blind spot?','Am I in a good time for decisions?'],
  ['How do I handle conflict?','What patterns do I repeat?','What does Mars say about my ambition?'],
  ['How do I process emotions?','What\'s my relationship to risk?','What makes me feel most alive?'],
];
let chipIdx = 0;

function showChips() {
  const pool = CHIP_POOLS[chipIdx % CHIP_POOLS.length];
  chipIdx++;
  document.getElementById('chips').innerHTML = pool.map(s =>
    `<div class="chip" onclick="useChip(this)">${s}</div>`
  ).join('');
}

function useChip(el) {
  const text = el.textContent;
  document.getElementById('user-input').value = text;
  document.getElementById('chips').innerHTML = '';
  sendMessage();
}

// ── MESSAGES ──
function addMsg(role, text) {
  const wrap = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = `msg ${role === 'assistant' ? 'ora' : 'user'}`;
  const sender = role === 'assistant' ? 'Ora' : (userData.name || 'You');
  el.innerHTML = `<div class="msg-sender">${sender}</div><div class="bubble">${escHtml(text)}</div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'msg ora';
  el.id = 'typing-el';
  el.innerHTML = `<div class="msg-sender">Ora</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-el');
  if (el) el.remove();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── API CALL ──
async function callOra(userText) {
  history.push({ role: 'user', content: userText });
  addMsg('user', userText);
  showTyping();
  busy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt(chart),
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Something went quiet — try again.';
    removeTyping();
    history.push({ role: 'assistant', content: reply });
    addMsg('assistant', reply);
    showChips();

  } catch(e) {
    removeTyping();
    const msg = e.message.includes('API_KEY') || e.message.includes('401')
      ? 'API key not set. Open index.html and paste your key where it says YOUR_API_KEY_HERE.'
      : 'Something shifted — please try again.';
    addMsg('assistant', msg);
    console.error('Ora error:', e);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
}

// ── SESSION START ──
function beginSession() {
  const name = document.getElementById('inp-name').value.trim();
  const date = document.getElementById('inp-date').value;
  const time = document.getElementById('inp-time').value;
  const city = document.getElementById('inp-city').value.trim();
  const errEl = document.getElementById('err-msg');

  if (!name || !date || !city) {
    errEl.textContent = 'Please enter your name, date of birth, and birth city.';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  userData = { name, date, time, city };
  chart = buildChart(name, date, time, city);
  history = [];

  document.getElementById('screen-onboard').classList.remove('active');
  document.getElementById('screen-chat').classList.add('active');

  renderStrip(chart);

  const opening = openingMessage(chart);
  history.push({ role: 'assistant', content: opening });
  addMsg('assistant', opening);
  showChips();
}

// ── SEND ──
async function sendMessage() {
  if (busy) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('chips').innerHTML = '';
  await callOra(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
